---
- name: Create deployment directory
  win_file:
    path: "{{ deploy_path }}"
    state: directory

- name: Copy Agent binary
  win_copy:
    src: agent.exe
    dest: "{{ deploy_path }}\\agent.exe"

- name: Copy NSSM binary
  win_copy:
    src: nssm.exe
    dest: "{{ deploy_path }}\\nssm.exe"

- name: Copy Npcap installer
  win_copy:
    src: npcap-1.87.exe
    dest: "{{ deploy_path }}\\npcap-1.87.exe"

- name: Check if Npcap is already installed (Registry check)
  win_shell: |
    # Check for Npcap registry entries (WinPcap-compatible mode)
    $npcapPath = "HKLM:\Software\Npcap"
    $winpcapPath = "HKLM:\Software\WinPcap"
    
    if ((Test-Path $npcapPath) -or (Test-Path $winpcapPath)) {
        Write-Output "NPCAP_FOUND"
        exit 0
    } else {
        Write-Output "NPCAP_NOT_FOUND"
        exit 1
    }
  register: npcap_check
  ignore_errors: yes

- name: Display initial Npcap detection
  debug:
    msg: "Npcap already installed: {{ npcap_check.rc == 0 }}"

- name: Install Npcap (WinPcap API-compatible mode)
  win_shell: |
    $npcapInstaller = "{{ deploy_path }}\npcap-1.87.exe"
    
    Write-Output "[*] Starting Npcap installation..."
    # Silent install with WinPcap API-compatible mode enabled
    # /S = Silent install
    # /winpcap_mode=yes = Enable WinPcap API-compatible mode
    # /loopback_support=yes = Enable loopback support for testing
    & $npcapInstaller /S /winpcap_mode=yes /loopback_support=yes
    
    Write-Output "[*] Npcap installer spawned. Waiting for completion..."
    Start-Sleep -Seconds 15
    
    Write-Output "[+] Npcap installation completed (or in progress)"
  args:
    chdir: "{{ deploy_path }}"
  when: npcap_check.rc != 0

- name: Wait for Npcap installation to complete
  win_shell: |
    # Wait up to 60 seconds for Npcap service to appear
    $timeout = 60
    $elapsed = 0
    $installDir = "C:\Program Files\Npcap"
    
    while ($elapsed -lt $timeout) {
      if (Test-Path $installDir) {
        Write-Output "Npcap installation directory found"
        exit 0
      }
      Start-Sleep -Seconds 2
      $elapsed += 2
    }
    
    # Check via registry as fallback
    if (Test-Path "HKLM:\Software\Npcap") {
      Write-Output "Npcap registry entry found"
      exit 0
    }
    
    Write-Output "[WARN] Npcap installation may still be in progress"
    exit 0
  when: npcap_check.rc != 0

- name: Verify Npcap was installed
  win_shell: |
    # Check for Npcap registry entries (WinPcap-compatible mode)
    $npcapPath = "HKLM:\Software\Npcap"
    $winpcapPath = "HKLM:\Software\WinPcap"
    $installDir = "C:\Program Files\Npcap"
    
    if ((Test-Path $npcapPath) -or (Test-Path $winpcapPath)) {
        Write-Output "✓ Npcap installation verified (Registry)"
        exit 0
    } elseif (Test-Path $installDir) {
        Write-Output "✓ Npcap installation directory found"
        exit 0
    } else {
        Write-Output "✗ Npcap installation could not be verified"
        Write-Output "  Please verify manually or run installer: $npcapPath\npcap-1.87.exe /S /winpcap_mode=yes"
        exit 0
    }
  register: npcap_verify
  when: npcap_check.rc != 0

- name: Display Npcap verification result
  debug:
    msg: "{{ npcap_verify.stdout | trim }}"
  when: npcap_check.rc != 0

- name: Install Agent as a Windows Service via NSSM
  win_shell: |
    $service = "{{ service_name }}"
    $agentPath = "{{ deploy_path }}\agent.exe"
    $nssmPath = "{{ deploy_path }}\nssm.exe"
    
    # Check if service already exists
    try {
      Get-Service -Name $service -ErrorAction Stop | Out-Null
      Write-Output "Service $service already exists. Removing..."
      & $nssmPath remove $service confirm
    } catch {
      Write-Output "Service $service does not exist. Creating new..."
    }
    
    # Install new service
    & $nssmPath install $service $agentPath
    & $nssmPath set $service DisplayName "{{ display_name }}"
    & $nssmPath set $service Description "{{ description }}"
    & $nssmPath set $service Start SERVICE_AUTO_START
    & $nssmPath set $service ObjectName "LocalSystem"
    & $nssmPath set $service AppExit Default Restart
    & $nssmPath set $service AppNoConsole 1
    
    Write-Output "Service installed successfully: $service"
  args:
    chdir: "{{ deploy_path }}"

- name: Start the Agent service
  win_service:
    name: "{{ service_name }}"
    state: started
    start_mode: auto

- name: Verify service is running
  win_shell: Get-Service "{{ service_name }}" | Select-Object Status, DisplayName, StartType
  register: svc_status

- name: Display service status
  debug:
    msg: "Service Status: {{ svc_status.stdout | trim }}"
