---
- name: Create deployment directory
  win_file:
    path: "{{ deploy_path }}"
    state: directory

- name: Copy Agent binary
  win_copy:
    src: agent.exe
    dest: "{{ deploy_path }}\\agent.exe"

- name: Copy NSSM binary
  win_copy:
    src: nssm.exe
    dest: "{{ deploy_path }}\\nssm.exe"

- name: Copy Npcap installer
  win_copy:
    src: npcap-1.87.exe
    dest: "{{ deploy_path }}\\npcap-1.87.exe"

- name: Check if Npcap is already installed (Registry check)
  win_shell: |
    # Check for Npcap registry entries (WinPcap-compatible mode)
    $npcapPath = "HKLM:\Software\Npcap"
    $winpcapPath = "HKLM:\Software\WinPcap"
    
    if ((Test-Path $npcapPath) -or (Test-Path $winpcapPath)) {
        Write-Output "NPCAP_FOUND"
        exit 0
    } else {
        Write-Output "NPCAP_NOT_FOUND"
        exit 1
    }
  register: npcap_check
  ignore_errors: yes

- name: Display initial Npcap detection
  debug:
    msg: "Npcap already installed: {{ npcap_check.rc == 0 }}"

- name: Install Npcap (WinPcap API-compatible mode)
  win_shell: |
    $npcapInstaller = "{{ deploy_path }}\npcap-1.87.exe"
    
    Write-Output "[*] Starting Npcap installation..."
    Write-Output "[*] Installer path: $npcapInstaller"
    Write-Output "[*] Installer exists: $(Test-Path $npcapInstaller)"
    
    try {
      # Run installer with explicit admin context
      $process = Start-Process -FilePath $npcapInstaller `
        -ArgumentList "/S /winpcap_mode=yes /loopback_support=yes" `
        -PassThru `
        -Wait `
        -Verb RunAs `
        -ErrorAction Stop
      
      $exitCode = $process.ExitCode
      Write-Output "[*] Npcap installer exited with code: $exitCode"
      
      if ($exitCode -eq 0 -or $exitCode -eq 3010) {
        Write-Output "[+] Npcap installation completed (exit code: $exitCode)"
        if ($exitCode -eq 3010) {
          Write-Output "[INFO] Exit code 3010 = system restart required"
        }
      } else {
        Write-Output "[WARN] Installer exited with code: $exitCode"
      }
    } catch {
      Write-Output "[!] Failed to execute installer: $_"
      Write-Output "[!] This is non-fatal - proceeding to verification..."
    }
    
    Write-Output "[*] Npcap installation phase completed"
  args:
    chdir: "{{ deploy_path }}"
  when: npcap_check.rc != 0
  timeout: 600

- name: Wait for Npcap installation to fully complete
  win_shell: |
    Write-Output "[*] Waiting for Npcap installation to settle..."
    Start-Sleep -Seconds 30
    Write-Output "[*] Checking if installation directory exists..."
    if (Test-Path "C:\Program Files\Npcap") {
      Write-Output "[+] Npcap directory found"
    } else {
      Write-Output "[*] Directory check complete"
    }
  when: npcap_check.rc != 0

- name: Verify Npcap was installed (Attempt 1)
  win_shell: |
    $npcapPath = "HKLM:\Software\Npcap"
    $winpcapPath = "HKLM:\Software\WinPcap"
    $installDir = "C:\Program Files\Npcap"
    
    Write-Output "[*] Checking registry: $npcapPath"
    Write-Output "    Exists: $(Test-Path $npcapPath)"
    Write-Output "[*] Checking registry: $winpcapPath"
    Write-Output "    Exists: $(Test-Path $winpcapPath)"
    Write-Output "[*] Checking directory: $installDir"
    Write-Output "    Exists: $(Test-Path $installDir)"
    
    if ((Test-Path $npcapPath) -or (Test-Path $winpcapPath)) {
        Write-Output "✓ Npcap verified via registry"
        exit 0
    } elseif (Test-Path $installDir) {
        Write-Output "✓ Npcap verified via directory"
        exit 0
    } else {
        Write-Output "✗ Npcap not found - waiting before retry..."
        exit 1
    }
  register: npcap_verify1
  when: npcap_check.rc != 0
  ignore_errors: yes

- name: Wait before verification retry (if needed)
  win_shell: |
    Write-Output "[*] Waiting 30 seconds before verification retry..."
    Start-Sleep -Seconds 30
  when: npcap_check.rc != 0 and npcap_verify1.rc != 0

- name: Verify Npcap was installed (Attempt 2)
  win_shell: |
    $npcapPath = "HKLM:\Software\Npcap"
    $winpcapPath = "HKLM:\Software\WinPcap"
    $installDir = "C:\Program Files\Npcap"
    
    if ((Test-Path $npcapPath) -or (Test-Path $winpcapPath)) {
        Write-Output "✓ Npcap installation verified (Registry - Attempt 2)"
        exit 0
    } elseif (Test-Path $installDir) {
        Write-Output "✓ Npcap installation verified (Directory - Attempt 2)"
        exit 0
    } else {
        Write-Output "✗ Npcap still not detected after 60 second wait"
        Write-Output "[!] Possible causes:"
        Write-Output "    1. Installer requires interactive mode"
        Write-Output "    2. System pending reboot"
        Write-Output "    3. UAC or permission issues"
        Write-Output ""
        Write-Output "Manual troubleshooting:"
        Write-Output "  Test-Path 'HKLM:\Software\Npcap'"
        Write-Output "  Test-Path 'C:\Program Files\Npcap'"
        Write-Output "  Get-ChildItem 'C:\Program Files' | grep -i npcap"
        exit 1
    }
  register: npcap_verify2
  when: npcap_check.rc != 0 and npcap_verify1.rc != 0
  ignore_errors: yes

- name: Set Npcap verification result
  set_fact:
    npcap_install_success: "{{ (npcap_verify1.rc == 0) or (npcap_verify2.rc == 0) }}"
  when: npcap_check.rc != 0

- name: Display Npcap verification result
  debug:
    msg: "Npcap installation {{ 'succeeded' if npcap_install_success else 'could not be verified' }}"
  when: npcap_check.rc != 0

- name: Install Agent as a Windows Service via NSSM
  win_shell: |
    $service = "{{ service_name }}"
    $agentPath = "{{ deploy_path }}\agent.exe"
    $nssmPath = "{{ deploy_path }}\nssm.exe"
    
    # Check if service already exists
    try {
      Get-Service -Name $service -ErrorAction Stop | Out-Null
      Write-Output "Service $service already exists. Removing..."
      & $nssmPath remove $service confirm
    } catch {
      Write-Output "Service $service does not exist. Creating new..."
    }
    
    # Install new service
    & $nssmPath install $service $agentPath
    & $nssmPath set $service DisplayName "{{ display_name }}"
    & $nssmPath set $service Description "{{ description }}"
    & $nssmPath set $service Start SERVICE_AUTO_START
    & $nssmPath set $service ObjectName "LocalSystem"
    & $nssmPath set $service AppExit Default Restart
    & $nssmPath set $service AppNoConsole 1
    
    Write-Output "Service installed successfully: $service"
  args:
    chdir: "{{ deploy_path }}"

- name: Start the Agent service
  win_service:
    name: "{{ service_name }}"
    state: started
    start_mode: auto

- name: Verify service is running
  win_shell: Get-Service "{{ service_name }}" | Select-Object Status, DisplayName, StartType
  register: svc_status

- name: Display service status
  debug:
    msg: "Service Status: {{ svc_status.stdout | trim }}"
