---
- name: Deploy RMM Blue Team Agent to Windows hosts
  hosts: rmm_windows
  gather_facts: false
  vars:
    ansible_connection: winrm
    ansible_winrm_server_cert_validation: ignore
    base_dir: "{{ playbook_dir }}"

  tasks:
    - name: Ensure visible deployment directory exists
      win_file:
        path: C:\ProgramData\RMMBlueTeam
        state: directory

    - name: Ensure log directory exists
      win_file:
        path: C:\ProgramData\RMMBlueTeam\logs
        state: directory

    - name: Copy RMM agent to the lab directory
      win_copy:
        src: "{{ base_dir }}/dist/rmm-agent.exe"
        dest: C:\ProgramData\RMMBlueTeam\rmm-agent.exe

    - name: Copy RMM deployment transcript helper
      win_copy:
        src: "{{ base_dir }}/scripts/deploy.ps1"
        dest: C:\ProgramData\RMMBlueTeam\deploy.ps1

    - name: Launch the RMM agent visibly in lab mode
      win_shell: |
        $env:RMM_DEMO_MODE = '1'
        $env:RMM_LAB_DIR = 'C:\ProgramData\RMMBlueTeam'
        $env:RMM_AUDIT_DIR = 'C:\ProgramData\RMMBlueTeam\logs'
        $env:RMM_STOP_FILE = 'C:\ProgramData\RMMBlueTeam\STOP'
        Start-Process -FilePath "C:\ProgramData\RMMBlueTeam\rmm-agent.exe" -WindowStyle Normal
      async: 45
      poll: 0

    - name: Leave a visible stop file reminder
      win_copy:
        content: "Create a file named STOP in this directory to stop the lab agent on startup."
        dest: C:\ProgramData\RMMBlueTeam\STOP.README.txt
