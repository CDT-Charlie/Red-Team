---
# Creates the staging directory, verifies all agent binaries are present,
# and runs a Python HTTP server as a systemd service.

- name: "[Staging] Create staging directory"
  file:
    path:  "{{ staging_dir }}"
    state: directory
    mode:  "0755"

- name: "[Staging] Verify Realm binaries exist"
  stat:
    path: "{{ staging_dir }}/{{ item }}"
  register: realm_bin_stat
  loop:
    - imix-linux
    - imix.exe
  failed_when: not realm_bin_stat.stat.exists

- name: "[Staging] Verify Sliver implants exist"
  stat:
    path: "{{ staging_dir }}/{{ item }}"
  register: sliver_bin_stat
  loop:
    - sliver-implant-linux
    - sliver-implant.exe
  failed_when: not sliver_bin_stat.stat.exists

- name: "[Staging] List staged binaries"
  shell: ls -lh {{ staging_dir }}/
  register: staging_ls
  changed_when: false

- name: "[Staging] Show staged files"
  debug:
    msg: "{{ staging_ls.stdout_lines }}"

- name: "[Staging] Create HTTP staging server systemd service"
  copy:
    dest: /etc/systemd/system/staging-http.service
    mode: "0644"
    content: |
      [Unit]
      Description=Agent Staging HTTP Server
      After=network-online.target

      [Service]
      WorkingDirectory={{ staging_dir }}
      ExecStart=/usr/bin/python3 -m http.server {{ staging_port }} --bind 0.0.0.0
      Restart=always
      RestartSec=3

      [Install]
      WantedBy=multi-user.target

- name: "[Staging] Enable and start HTTP server"
  systemd:
    name:         staging-http
    enabled:      true
    state:        started
    daemon_reload: true

- name: "[Staging] Wait for HTTP server to be reachable"
  wait_for:
    host:    127.0.0.1
    port:    "{{ staging_port }}"
    timeout: 30

- name: "[Staging] Confirm staging server is live"
  debug:
    msg: "Staging HTTP server live at http://{{ attacker_ip }}:{{ staging_port }}"
