---
# =============================================================================
#  cleanup.yml  —  Remove all deployed agents from all targets
#  Usage:  ansible-playbook cleanup.yml
#          ansible-playbook cleanup.yml --limit windows
#          ansible-playbook cleanup.yml --tags realm
# =============================================================================

# ── Linux cleanup ─────────────────────────────────────────────────────────────
- name: Remove agents from Linux hosts
  hosts: linux
  gather_facts: false
  become: true
  tasks:

    # Realm
    - name: "[Realm] Stop and disable systemd service"
      systemd:
        name: systemd-update
        state: stopped
        enabled: false
      ignore_errors: true
      tags: realm

    - name: "[Realm] Remove service unit file"
      file:
        path: /etc/systemd/system/systemd-update.service
        state: absent
      notify: Reload systemd
      tags: realm

    - name: "[Realm] Remove binary"
      file:
        path: /usr/local/bin/svc-update
        state: absent
      tags: realm

    # Sliver
    - name: "[Sliver] Stop and disable systemd service"
      systemd:
        name: kworker-svc
        state: stopped
        enabled: false
      ignore_errors: true
      tags: sliver

    - name: "[Sliver] Remove service unit file"
      file:
        path: /etc/systemd/system/kworker-svc.service
        state: absent
      notify: Reload systemd
      tags: sliver

    - name: "[Sliver] Remove binary"
      file:
        path: /usr/local/bin/kworker
        state: absent
      tags: sliver

    # Caldera
    - name: "[Caldera] Stop and disable systemd service"
      systemd:
        name: sys-perfmon
        state: stopped
        enabled: false
      ignore_errors: true
      tags: caldera

    - name: "[Caldera] Remove service unit file"
      file:
        path: /etc/systemd/system/sys-perfmon.service
        state: absent
      notify: Reload systemd
      tags: caldera

    - name: "[Caldera] Remove binary"
      file:
        path: /usr/local/bin/sys-perfmon
        state: absent
      tags: caldera

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: true

# ── Windows cleanup ───────────────────────────────────────────────────────────
- name: Remove agents from Windows hosts
  hosts: windows
  gather_facts: false
  tasks:

    # Realm
    - name: "[Realm] Kill agent process"
      win_shell: Stop-Process -Name svc-update -Force -ErrorAction SilentlyContinue
      tags: realm

    - name: "[Realm] Remove Scheduled Task"
      win_scheduled_task:
        name: "Windows System Update Helper"
        state: absent
      ignore_errors: true
      tags: realm

    - name: "[Realm] Remove binary"
      win_file:
        path: 'C:\Windows\System32\svc-update.exe'
        state: absent
      tags: realm

    # Sliver
    - name: "[Sliver] Kill agent process"
      win_shell: Stop-Process -Name WmiPrvSE_svc -Force -ErrorAction SilentlyContinue
      tags: sliver

    - name: "[Sliver] Remove Scheduled Task"
      win_scheduled_task:
        name: "WMI Performance Adapter Helper"
        state: absent
      ignore_errors: true
      tags: sliver

    - name: "[Sliver] Remove binary"
      win_file:
        path: 'C:\Windows\System32\WmiPrvSE_svc.exe'
        state: absent
      tags: sliver

    # Caldera
    - name: "[Caldera] Kill agent process"
      win_shell: Stop-Process -Name perfmon-svc -Force -ErrorAction SilentlyContinue
      tags: caldera

    - name: "[Caldera] Remove Scheduled Task"
      win_scheduled_task:
        name: "Performance Monitor Service"
        state: absent
      ignore_errors: true
      tags: caldera

    - name: "[Caldera] Remove binary"
      win_file:
        path: 'C:\Windows\System32\perfmon-svc.exe'
        state: absent
      tags: caldera
