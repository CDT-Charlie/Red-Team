---
# =============================================================================
#  setup-c2.yml  —  Bring up C2 servers only (no agent deployment)
#  Useful to run first, verify everything is healthy, then run site.yml.
#
#  Usage:  ansible-playbook setup-c2.yml
# =============================================================================

- name: "Build Realm (Imix) binaries"
  hosts: c2
  gather_facts: true
  roles:
    - realm-server

- name: "Install and start Caldera C2"
  hosts: c2
  gather_facts: true
  roles:
    - caldera-server

- name: "Install Sliver C2 + generate implants"
  hosts: c2
  gather_facts: true
  roles:
    - sliver-server

- name: "Start staging HTTP file server"
  hosts: c2
  gather_facts: false
  roles:
    - staging-server
