---
# =============================================================================
#  deploy-caldera.yml  —  Deploy Caldera Sandcat agent only
#  Pre-requisite: Caldera server must be running and reachable at caldera_c2_ip.
#
#  Usage:  ansible-playbook deploy-caldera.yml
#          ansible-playbook deploy-caldera.yml --limit windows
#          ansible-playbook deploy-caldera.yml --limit linux
# =============================================================================

- name: Deploy Caldera Sandcat agent — Linux
  hosts: linux
  gather_facts: true
  roles:
    - caldera

- name: Deploy Caldera Sandcat agent — Windows
  hosts: windows
  gather_facts: true
  roles:
    - caldera
