all:
  vars:
    # =========================================================================
    # Shared credentials — one user/password for ALL targets
    # =========================================================================
    deploy_user: "King"
    deploy_password: "Password123!"

    # =========================================================================
    # C2 / Staging — set these to your attacker infra
    # =========================================================================

    # HTTP staging server that hosts pre-built Realm + Sliver binaries
    # Run on your attacker box (example): python3 -m http.server 9999
    staging_ip: "192.168.0.11"
    staging_port: "9999"

    # Realm (Imix)
    realm_c2_ip: "192.168.0.11"
    realm_c2_port: "1337"

    # Sliver (implant is pre-generated, then hosted on staging server)
    sliver_c2_ip: "192.168.0.11"
    sliver_c2_port: "8888"

    # Caldera
    caldera_c2_ip: "192.168.0.11"
    caldera_c2_port: "8888"
    caldera_group: "red"

  children:
    # =========================================================================
    # Blue Team 1 — 10.1.1.0/24
    # =========================================================================
    windows:
      hosts:
        bt1-armory:
          # ansible_host: 192.168.0.26
          ansible_host: 10.1.1.1   # IIS
        bt1-sewers:
          # ansible_host: 192.168.0.27
          ansible_host: 10.1.1.2   # SMB
        bt1-fortress:
          # ansible_host: 192.168.0.28
          ansible_host: 10.1.1.3   # DNS

    debian:
      hosts:
        bt1-dungeon:  
          # ansible_host: 192.168.0.29
          ansible_host: 10.1.1.4   # GitLab
        bt1-cathedral:
          # ansible_host: 192.168.0.30
          ansible_host: 10.1.1.5   # IRC
        bt1-gallows:
          # ansible_host: 192.168.0.31
          ansible_host: 10.1.1.6   # Nginx

    ubuntu:
      hosts:
        bt1-market:
          # ansible_host: 192.168.0.32
          ansible_host: 10.1.1.7   # Docker w/ NetHack
        bt1-stables:
          # ansible_host: 192.168.0.33
          ansible_host: 10.1.1.8   # MySQL
        bt1-pigeontower:
          # ansible_host: 192.168.0.34
          ansible_host: 10.1.1.9   # Postfix

    # =========================================================================
    # Blue Team 2 — 10.2.1.0/24
    # =========================================================================
    windows_bt2:
      hosts:
        bt2-armory:
          # ansible_host: 192.168.0.35
          ansible_host: 10.2.1.1   # IIS
        bt2-sewers:
          # ansible_host: 192.168.0.36
          ansible_host: 10.2.1.2   # SMB
        bt2-fortress:
          # ansible_host: 192.168.0.37
          ansible_host: 10.2.1.3   # DNS

    debian_bt2:
      hosts:
        bt2-dungeon:
          # ansible_host: 192.168.0.38
          ansible_host: 10.2.1.4   # GitLab
        bt2-cathedral:
          # ansible_host: 192.168.0.39
          ansible_host: 10.2.1.5   # IRC
        bt2-gallows:
          # ansible_host: 192.168.0.40
          ansible_host: 10.2.1.6   # Nginx

    ubuntu_bt2:
      hosts:
        bt2-market:
          # ansible_host: 192.168.0.41
          ansible_host: 10.2.1.7   # Docker w/ NetHack
        bt2-stables:
          # ansible_host: 192.168.0.42
          ansible_host: 10.2.1.8   # MySQL

    fedora_bt2:
      hosts:
        bt2-pigeontower:
          # ansible_host: 192.168.0.43
          ansible_host: 10.2.1.9   # Fedora

    # =========================================================================
    # Convenience groups
    # =========================================================================
    linux:
      children:
        debian:
        ubuntu:
        fedora:
        debian_bt2:
        ubuntu_bt2:
        fedora_bt2:

    windows_all:
      children:
        windows:
        windows_bt2:

    all_targets:
      children:
        linux:
        windows_all:
