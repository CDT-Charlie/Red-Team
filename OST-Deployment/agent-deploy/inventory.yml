all:
  vars:
    # =========================================================================
    #  ONE IP TO CHANGE — your attacker / C2 box
    #  All callback URLs and the staging server derive from this.
    # =========================================================================
    attacker_ip: "192.168.0.11"

    # =========================================================================
    #  Shared credentials — same user/password across ALL targets
    # =========================================================================
    deploy_user:     "administrator"
    deploy_password: "Password123!"

    # =========================================================================
    #  Derived C2 / staging addresses (no need to edit below this line)
    # =========================================================================
    staging_ip:   "{{ attacker_ip }}"
    staging_port: "9999"
    staging_dir:  "/opt/staging"

    realm_c2_ip:   "{{ attacker_ip }}"
    realm_c2_port: "1337"

    sliver_c2_ip:   "{{ attacker_ip }}"
    sliver_c2_port: "8888"

    caldera_c2_ip:   "{{ attacker_ip }}"
    caldera_c2_port: "8888"
    caldera_group:   "red"

  children:

    # =========================================================================
    #  Attacker / C2 box  (runs locally — change ansible_connection to ssh
    #  and set ansible_host if your C2 server is a separate remote machine)
    # =========================================================================
    c2:
      hosts:
        attacker:
          ansible_host:       127.0.0.1
          ansible_connection: local

    # =========================================================================
    #  Blue Team 1 — CURRENT RANGE (Windows 192.168.1.23-25, Ubuntu 192.168.1.26-28)
    #  NOTE: Original addresses from the diagram are kept below but commented out
    #  for quick reuse if needed.
    # =========================================================================
    bt1_windows:
      hosts:
        bt1-armory:   { ansible_host: 192.168.1.23 } # Windows BT1
        bt1-sewers:   { ansible_host: 192.168.1.24 } # Windows BT1
        bt1-fortress: { ansible_host: 192.168.1.25 } # Windows BT1
      # Original diagram values (commented out):
      # bt1-armory:   { ansible_host: 10.1.1.1 }    # IIS
      # bt1-sewers:   { ansible_host: 10.1.1.2 }    # SMB
      # bt1-fortress: { ansible_host: 10.1.1.3 }    # DNS

    # No Debian boxes used in the current range, but the group is left for future use.
    bt1_debian:
      hosts:
        # bt1-dungeon:   { ansible_host: 10.1.1.4 }   # GitLab
        # bt1-cathedral: { ansible_host: 10.1.1.5 }   # IRC
        # bt1-gallows:   { ansible_host: 10.1.1.6 }   # Nginx

    bt1_ubuntu:
      hosts:
        bt1-market:      { ansible_host: 192.168.1.26 } # Ubuntu BT1
        bt1-stables:     { ansible_host: 192.168.1.27 } # Ubuntu BT1
        bt1-pigeontower: { ansible_host: 192.168.1.28 } # Ubuntu BT1
      # Original diagram values (commented out):
      # bt1-market:      { ansible_host: 10.1.1.7 } # Docker w/ NetHack
      # bt1-stables:     { ansible_host: 10.1.1.8 } # MySQL
      # bt1-pigeontower: { ansible_host: 10.1.1.9 } # Ubuntu

    # =========================================================================
    #  Blue Team 2 — original competition diagram (currently UNUSED)
    #  All hosts are commented out so only BT1 is targeted by default.
    # =========================================================================
    bt2_windows:
      hosts:
        # bt2-armory:   { ansible_host: 10.2.1.1 }    # IIS
        # bt2-sewers:   { ansible_host: 10.2.1.2 }    # SMB
        # bt2-fortress: { ansible_host: 10.2.1.3 }    # DNS

    bt2_debian:
      hosts:
        # bt2-dungeon:   { ansible_host: 10.2.1.4 }   # GitLab
        # bt2-cathedral: { ansible_host: 10.2.1.5 }   # IRC
        # bt2-gallows:   { ansible_host: 10.2.1.6 }   # Nginx

    bt2_ubuntu:
      hosts:
        # bt2-market:      { ansible_host: 10.2.1.7 } # Docker w/ NetHack
        # bt2-stables:     { ansible_host: 10.2.1.8 } # MySQL
        # bt2-pigeontower: { ansible_host: 10.2.1.9 } # Ubuntu

    # =========================================================================
    #  OS convenience groups  (BT1 + BT2 combined)
    # =========================================================================
    windows:
      children:
        bt1_windows:
        bt2_windows:

    debian:
      children:
        bt1_debian:
        bt2_debian:

    ubuntu:
      children:
        bt1_ubuntu:
        bt2_ubuntu:

    linux:
      children:
        debian:
        ubuntu:

    # =========================================================================
    #  Blue team convenience groups
    # =========================================================================
    bt1:
      children:
        bt1_windows:
        bt1_debian:
        bt1_ubuntu:

    bt2:
      children:
        bt2_windows:
        bt2_debian:
        bt2_ubuntu:

    # =========================================================================
    #  All victims
    # =========================================================================
    victims:
      children:
        linux:
        windows:
