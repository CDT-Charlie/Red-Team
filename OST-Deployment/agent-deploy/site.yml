---
# =============================================================================
#  site.yml  —  Deploy ALL three agents to ALL victims
#  Assumes C2 servers + staging HTTP server are already running.
#  To bring up C2 first AND deploy, use run-all.yml instead.
#
#  Usage:  ansible-playbook site.yml
# =============================================================================

- name: Deploy Realm + Sliver + Caldera — Linux victims
  hosts: linux
  gather_facts: true
  roles:
    - realm
    - sliver
    - caldera

- name: Deploy Realm + Sliver + Caldera — Windows victims
  hosts: windows
  gather_facts: true
  roles:
    - realm
    - sliver
    - caldera
