---
# =============================================================================
#  site.yml  —  Deploy ALL three agents (Realm + Sliver + Caldera) to all targets
#  Usage:  ansible-playbook site.yml
# =============================================================================

- name: Deploy Realm (Imix) agent — Linux
  hosts: linux
  gather_facts: true
  roles:
    - realm

- name: Deploy Realm (Imix) agent — Windows
  hosts: windows
  gather_facts: true
  roles:
    - realm

- name: Deploy Sliver implant — Linux
  hosts: linux
  gather_facts: true
  roles:
    - sliver

- name: Deploy Sliver implant — Windows
  hosts: windows
  gather_facts: true
  roles:
    - sliver

- name: Deploy Caldera Sandcat agent — Linux
  hosts: linux
  gather_facts: true
  roles:
    - caldera

- name: Deploy Caldera Sandcat agent — Windows
  hosts: windows
  gather_facts: true
  roles:
    - caldera
